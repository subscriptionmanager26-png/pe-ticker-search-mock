<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#ffffff" />
    <title>PocketEdge — Ticker search mock B</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,500;6..72,600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="phone">
      <header class="topbar">
        <div class="topbar-mark">PocketEdge</div>
        <div class="topbar-badge">Mock B</div>
      </header>
      <main class="screen" id="screen">
        <p class="eyebrow">Portfolio setup</p>
        <h1 class="title">Add holdings</h1>
        <p class="lede">Tap a ticker field. The search should lift to the top — not pop a modal.</p>
        <section class="total-card">
          <p class="total-label">Total invested</p>
          <p class="total-value">₹2,40,000</p>
          <p class="total-hint">2 holdings · match this with your broker app</p>
        </section>
        <div class="table-head">
          <span>Ticker</span>
          <span class="right">Invested</span>
          <span class="right">Qty</span>
        </div>
        <div class="rows" id="rows"></div>
        <button type="button" class="add-row" id="addRow">+ Add holding</button>
      </main>
      <div class="search-layer" id="searchLayer" aria-hidden="true">
        <div class="search-backdrop" id="searchBackdrop"></div>
        <div class="search-sheet" id="searchSheet">
          <div class="search-chrome">
            <button type="button" class="cancel" id="searchCancel">Cancel</button>
            <div class="search-field-wrap" id="searchFieldWrap">
              <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2" />
                <path d="M20 20l-3.5-3.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
              <input id="searchInput" type="text" inputmode="search" enterkeyhint="search" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" placeholder="Search stock, ETF, or fund" />
            </div>
          </div>
          <div class="results" id="results"></div>
        </div>
      </div>
    </div>
    <p class="desktop-hint">Open this URL on your iPhone. This is Mock B — expand-to-top search.</p>
    <script src="./app.js"></script>
  </body>
</html>
