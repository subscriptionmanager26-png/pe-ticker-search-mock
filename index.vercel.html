<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#ffffff"/>
<title>PocketEdge — Ticker search mocks</title>
<style>
:root {
  --pe-canvas: #ffffff;
  --pe-surface: #f7f6f4;
  --pe-text: #1a1a1a;
  --pe-text-secondary: #6b6b6b;
  --pe-text-muted: #8a8a8a;
  --pe-border: #ececec;
  --pe-border-strong: #e7e5e1;
  --pe-accent: #ff6719;
  --pe-accent-pressed: #e5560e;
  --pe-accent-wash: #fff7f2;
  --pe-accent-border: #ffd9c2;
  --pe-negative: #d93025;
  --pe-ink: #1f1f1f;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  color-scheme: light;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  margin: 0;
  min-height: 100%;
}

body {
  min-height: 100dvh;
  background: var(--pe-canvas);
  color: var(--pe-text);
  font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI',
    Roboto, 'Helvetica Neue', Arial, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

button,
input {
  font: inherit;
}

/* Match production: prevent iOS Safari focus zoom */
@supports (-webkit-touch-callout: none) {
  input:not([type='checkbox']):not([type='radio']):not([type='button']):not([type='submit']) {
    font-size: 16px !important;
  }
}

a {
  color: inherit;
  text-decoration: none;
}

/* —— Shell (AuthLayoutHeader + onboarding) —— */
.app {
  display: flex;
  min-height: 100dvh;
  flex-direction: column;
  background: var(--pe-canvas);
}

.nav {
  position: sticky;
  top: 0;
  z-index: 40;
  flex-shrink: 0;
  border-bottom: 1px solid var(--pe-border);
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(12px);
}

.nav-inner {
  margin: 0 auto;
  display: flex;
  height: 56px;
  max-width: 40rem;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
  padding: 0 1rem;
  padding-top: var(--safe-top);
}

.brand {
  display: flex;
  min-width: 0;
  align-items: center;
  gap: 0.625rem;
}

.brand img {
  width: 28px;
  height: 28px;
  object-fit: contain;
}

.brand-name {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--pe-text);
}

.nav-badge {
  margin-left: auto;
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--pe-text-muted);
}

.main {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.main-inner {
  margin: 0 auto;
  max-width: 40rem;
  padding: 1.5rem 1rem calc(2rem + var(--safe-bottom));
}

.back {
  display: inline-flex;
  align-items: center;
  gap: 0.375rem;
  margin-bottom: 1.5rem;
  border: 0;
  background: transparent;
  padding: 0;
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--pe-text-secondary);
  cursor: pointer;
}

.back:hover {
  color: var(--pe-text);
}

.page-title {
  margin: 0;
  font-size: 1.75rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.15;
  color: var(--pe-text);
}

.page-lede {
  margin: 0.5rem 0 0;
  font-size: 0.95rem;
  line-height: 1.45;
  color: var(--pe-text-secondary);
}

/* —— Chooser home —— */
.chooser {
  display: grid;
  gap: 0.75rem;
  margin-top: 1.75rem;
}

.chooser-card {
  display: block;
  border: 1px solid var(--pe-border-strong);
  border-radius: 0.5rem;
  background: var(--pe-canvas);
  padding: 1.1rem 1rem;
  transition: border-color 140ms ease, background 140ms ease;
}

.chooser-card:active,
.chooser-card:hover {
  border-color: var(--pe-accent);
  background: var(--pe-accent-wash);
}

.chooser-kicker {
  margin: 0;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--pe-accent);
}

.chooser-title {
  margin: 0.35rem 0 0;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--pe-text);
}

.chooser-body {
  margin: 0.35rem 0 0;
  font-size: 0.875rem;
  line-height: 1.45;
  color: var(--pe-text-secondary);
}

.note {
  margin-top: 1.5rem;
  padding: 0.85rem 1rem;
  border-radius: 0.5rem;
  border: 1px solid var(--pe-border);
  background: var(--pe-surface);
  font-size: 0.8125rem;
  line-height: 1.45;
  color: var(--pe-text-secondary);
}

/* —— Holdings (HoldingsEditTable) —— */
.total-card {
  margin-top: 1.5rem;
  border-radius: 0.5rem;
  border: 1px solid var(--pe-border);
  background: var(--pe-surface);
  padding: 0.85rem 1rem;
}

.section-label {
  margin: 0;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--pe-text-muted);
}

.total-value {
  margin: 0.25rem 0 0;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
  color: var(--pe-text);
}

.total-hint {
  margin: 0.25rem 0 0;
  font-size: 13px;
  color: var(--pe-text-secondary);
}

.holdings-head {
  margin-top: 2rem;
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
  justify-content: space-between;
  gap: 0.75rem;
}

.cost-toggle {
  display: flex;
  width: fit-content;
  gap: 0.25rem;
  border-radius: 0.5rem;
  background: var(--pe-surface);
  padding: 0.25rem;
}

.cost-toggle button {
  appearance: none;
  border: 0;
  border-radius: 0.375rem;
  background: transparent;
  padding: 0.375rem 0.75rem;
  font-size: 12px;
  font-weight: 600;
  color: var(--pe-text-muted);
  cursor: pointer;
}

.cost-toggle button.active {
  background: var(--pe-canvas);
  color: var(--pe-text);
  box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
}

.col-head {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 7.25rem 4.5rem 2.25rem;
  gap: 0.5rem;
  margin-top: 1rem;
  padding: 0 0.125rem;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--pe-text-muted);
}

.col-head .right {
  text-align: right;
}

.rows {
  margin-top: 0.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.row {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 7.25rem 4.5rem 2.25rem;
  gap: 0.5rem;
  align-items: start;
}

.field {
  width: 100%;
  min-width: 0;
  min-height: 40px;
  border: 1px solid var(--pe-border-strong);
  border-radius: 0.375rem;
  background: var(--pe-canvas);
  padding: 0.5rem 0.625rem;
  color: var(--pe-text);
  outline: none;
  font-size: 16px;
}

.field:focus {
  border-color: var(--pe-accent);
  box-shadow: 0 0 0 1px var(--pe-accent);
}

.field.right {
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.search-anchor {
  position: relative;
  min-width: 0;
}

.delete-btn {
  display: flex;
  height: 36px;
  width: 36px;
  flex-shrink: 0;
  align-items: center;
  justify-content: center;
  border: 0;
  border-radius: 0.375rem;
  background: transparent;
  color: var(--pe-text-muted);
  cursor: pointer;
}

.delete-btn:hover {
  background: var(--pe-surface);
  color: var(--pe-negative);
}

.add-row {
  margin-top: 0.85rem;
  appearance: none;
  border: 0;
  background: transparent;
  padding: 0.35rem 0.125rem;
  font-size: 0.95rem;
  font-weight: 650;
  color: var(--pe-accent);
  cursor: pointer;
}

.footer {
  flex-shrink: 0;
  border-top: 1px solid var(--pe-border);
  background: var(--pe-canvas);
  padding: 1rem 1rem max(1rem, var(--safe-bottom));
}

.footer-inner {
  margin: 0 auto;
  max-width: 40rem;
}

.primary-btn {
  display: inline-flex;
  width: 100%;
  align-items: center;
  justify-content: center;
  border: 0;
  border-radius: 0.375rem;
  background: var(--pe-accent);
  padding: 0.75rem 1rem;
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
}

.primary-btn:hover {
  background: var(--pe-accent-pressed);
}

/* —— Mock A: fixed portal dropdown —— */
.dropdown {
  position: fixed;
  z-index: 70;
  max-height: 16rem;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  border: 1px solid var(--pe-border-strong);
  border-radius: 0.375rem;
  background: var(--pe-canvas);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
}

.dropdown-empty {
  padding: 0.65rem 0.75rem;
  font-size: 12px;
  color: var(--pe-text-muted);
}

.result {
  appearance: none;
  width: 100%;
  border: 0;
  border-bottom: 1px solid var(--pe-border);
  background: transparent;
  padding: 0.65rem 0.75rem;
  text-align: left;
  color: var(--pe-text);
  cursor: pointer;
}

.result:last-child {
  border-bottom: 0;
}

.result:active,
.result:hover {
  background: var(--pe-surface);
}

.result-top {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.result-sym {
  font-size: 14px;
  font-weight: 600;
}

.result-kind {
  border-radius: 999px;
  background: var(--pe-surface);
  padding: 0.125rem 0.5rem;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--pe-text-muted);
}

.result-name {
  margin-top: 0.125rem;
  font-size: 12px;
  line-height: 1.35;
  color: var(--pe-text-muted);
}

/* —— Mock B: expand-to-top sheet —— */
.search-layer {
  position: fixed;
  inset: 0;
  z-index: 80;
  pointer-events: none;
  visibility: hidden;
}

.search-layer.open,
.search-layer.closing {
  pointer-events: auto;
  visibility: visible;
}

.search-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(26, 26, 26, 0.28);
  opacity: 0;
  transition: opacity 260ms ease;
}

.search-layer.open .search-backdrop {
  opacity: 1;
}

.search-layer.closing .search-backdrop {
  opacity: 0;
}

.search-sheet {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  background: var(--pe-canvas);
  opacity: 0;
  will-change: clip-path, opacity;
}

.search-layer.open .search-sheet,
.search-layer.closing .search-sheet {
  opacity: 1;
}

.search-sheet.morphing-from {
  transition: none;
}

.search-chrome {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 0.65rem;
  align-items: center;
  padding: calc(0.65rem + var(--safe-top)) 1rem 0.65rem;
  border-bottom: 1px solid var(--pe-border);
  background: rgba(255, 255, 255, 0.96);
  backdrop-filter: blur(12px);
}

.cancel {
  appearance: none;
  border: 0;
  background: transparent;
  padding: 0.4rem 0.15rem;
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--pe-text-secondary);
  cursor: pointer;
}

.search-field-wrap {
  display: flex;
  min-height: 44px;
  align-items: center;
  gap: 0.5rem;
  border: 1px solid var(--pe-border-strong);
  border-radius: 0.5rem;
  background: var(--pe-surface);
  padding: 0 0.75rem;
}

.search-field-wrap:focus-within {
  border-color: var(--pe-accent);
  box-shadow: 0 0 0 1px var(--pe-accent);
}

.search-field-wrap input {
  width: 100%;
  min-width: 0;
  border: 0;
  background: transparent;
  outline: none;
  font-size: 16px;
  color: var(--pe-text);
}

.search-field-wrap input::placeholder {
  color: var(--pe-text-muted);
}

.sheet-results {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(1rem + var(--safe-bottom));
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 260ms ease 80ms, transform 360ms cubic-bezier(0.16, 1, 0.3, 1) 40ms;
}

.search-layer.open .sheet-results {
  opacity: 1;
  transform: translateY(0);
}

.search-layer.closing .sheet-results {
  opacity: 0;
  transform: translateY(6px);
  transition-duration: 140ms;
  transition-delay: 0ms;
}

@keyframes resultIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

</style>
</head>
<body>
<div id="root"></div>
<script>
const ASSETS = [
  { key: 'RELIANCE', name: 'Reliance Industries Ltd', kind: 'stock', kindLabel: 'Stock' },
  { key: 'TCS', name: 'Tata Consultancy Services', kind: 'stock', kindLabel: 'Stock' },
  { key: 'INFY', name: 'Infosys Limited', kind: 'stock', kindLabel: 'Stock' },
  { key: 'HDFCBANK', name: 'HDFC Bank Limited', kind: 'stock', kindLabel: 'Stock' },
  { key: 'ICICIBANK', name: 'ICICI Bank Limited', kind: 'stock', kindLabel: 'Stock' },
  { key: 'SBIN', name: 'State Bank of India', kind: 'stock', kindLabel: 'Stock' },
  { key: 'BHARTIARTL', name: 'Bharti Airtel Limited', kind: 'stock', kindLabel: 'Stock' },
  { key: 'ITC', name: 'ITC Limited', kind: 'stock', kindLabel: 'Stock' },
  { key: 'LT', name: 'Larsen & Toubro Limited', kind: 'stock', kindLabel: 'Stock' },
  { key: 'AXISBANK', name: 'Axis Bank Limited', kind: 'stock', kindLabel: 'Stock' },
  { key: 'NIFTYBEES', name: 'Nippon India ETF Nifty BeES', kind: 'etf', kindLabel: 'ETF' },
  { key: 'GOLDSHARE', name: 'Nippon India ETF Gold BeES', kind: 'etf', kindLabel: 'ETF' },
  { key: '120503', name: 'HDFC Flexi Cap Fund - Growth', kind: 'fund', kindLabel: 'Fund' },
  { key: '119551', name: 'Parag Parikh Flexi Cap Fund - Growth', kind: 'fund', kindLabel: 'Fund' },
  { key: '125497', name: 'Quant Small Cap Fund - Growth', kind: 'fund', kindLabel: 'Fund' },
  { key: '118989', name: 'UTI Nifty 50 Index Fund - Growth', kind: 'fund', kindLabel: 'Fund' },
];

function escapeHtml(value) {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;');
}

function formatInr(value) {
  return `₹${Math.round(value).toLocaleString('en-IN')}`;
}

function displaySymbol(asset) {
  if (asset.kind === 'fund') return asset.name || asset.key;
  return asset.key;
}

function filterAssets(query) {
  const q = query.trim().toLowerCase();
  if (q.length < 2) return [];
  return ASSETS.filter(
    (asset) =>
      asset.key.toLowerCase().includes(q) ||
      asset.name.toLowerCase().includes(q) ||
      asset.kindLabel.toLowerCase().includes(q)
  ).slice(0, 8);
}

function resultButtonHtml(asset, index = 0) {
  const primary = displaySymbol(asset);
  const secondary = asset.kind === 'fund' ? 'Mutual fund' : asset.name;
  return `
    <button type="button" class="result" data-key="${escapeHtml(asset.key)}"
      style="animation: resultIn 320ms cubic-bezier(0.16,1,0.3,1) ${30 + index * 24}ms both">
      <div class="result-top">
        <span class="result-sym">${escapeHtml(primary)}</span>
        <span class="result-kind">${escapeHtml(asset.kindLabel)}</span>
      </div>
      ${asset.kind === 'fund' ? '' : `<p class="result-name">${escapeHtml(secondary)}</p>`}
    </button>
  `;
}

function createInitialRows() {
  return [
    {
      id: crypto.randomUUID(),
      ticker: 'RELIANCE',
      name: 'Reliance Industries Ltd',
      invested: '150000',
      qty: '50',
    },
    {
      id: crypto.randomUUID(),
      ticker: '',
      name: '',
      invested: '90000',
      qty: '',
    },
  ];
}

function sumInvested(rows) {
  return rows.reduce((sum, row) => {
    const n = Number(row.invested);
    return sum + (row.invested !== '' && !Number.isNaN(n) && n >= 0 ? n : 0);
  }, 0);
}

function countHoldings(rows) {
  return rows.filter((row) => String(row.ticker || '').trim()).length;
}

window.PEMock = {
  ASSETS,
  escapeHtml,
  formatInr,
  displaySymbol,
  filterAssets,
  resultButtonHtml,
  createInitialRows,
  sumInvested,
  countHoldings,
};

</script>
<script>
(function () {
  const {
    escapeHtml,
    formatInr,
    filterAssets,
    resultButtonHtml,
    createInitialRows,
    sumInvested,
    countHoldings,
    ASSETS,
  } = window.PEMock;

  const LOGO =
    window.__LOGO_SRC__ ||
    'https://cdn.jsdelivr.net/gh/subscriptionmanager26-png/pe-ticker-search-mock@main/logo.png';

  const root = document.getElementById('root');

  function nav(badge, backHref) {
    return `
      <header class="nav">
        <div class="nav-inner">
          <div class="brand">
            <img src="${LOGO}" alt="" width="28" height="28" />
            <span class="brand-name">PocketEdge</span>
          </div>
          <span class="nav-badge">${escapeHtml(badge)}</span>
        </div>
      </header>
    `;
  }

  function holdingsChrome(mockLabel, lede) {
    return `
      ${nav(mockLabel)}
      <div class="main" id="scrollRoot">
        <div class="main-inner">
          <a class="back" href="#/">← All mocks</a>
          <h1 class="page-title">Add holdings</h1>
          <p class="page-lede">${lede}</p>
          <section class="total-card">
            <p class="section-label">Total invested</p>
            <p class="total-value" id="totalValue">₹0</p>
            <p class="total-hint" id="totalHint">Add holdings below</p>
          </section>
          <div class="holdings-head">
            <p class="section-label">Holdings</p>
            <div class="cost-toggle" role="group" aria-label="Cost input mode">
              <button type="button" class="active" data-cost="invested">Total invested</button>
              <button type="button" data-cost="avg">Avg price</button>
            </div>
          </div>
          <div class="col-head">
            <span>Ticker</span>
            <span class="right" id="costHead">Total invested</span>
            <span class="right">Qty</span>
            <span></span>
          </div>
          <div class="rows" id="rows"></div>
          <button type="button" class="add-row" id="addRow">+ Add holding</button>
        </div>
      </div>
      <footer class="footer">
        <div class="footer-inner">
          <button type="button" class="primary-btn">Continue</button>
        </div>
      </footer>
    `;
  }

  function renderHome() {
    root.innerHTML = `
      <div class="app">
        ${nav('Mocks')}
        <div class="main">
          <div class="main-inner">
            <h1 class="page-title">Ticker search</h1>
            <p class="page-lede">
              Two iPhone Safari approaches for holdings ticker search. Same PocketEdge UI —
              pick one and test on your phone.
            </p>
            <div class="chooser">
              <a class="chooser-card" href="#/a">
                <p class="chooser-kicker">Mock A</p>
                <p class="chooser-title">Anchored dropdown</p>
                <p class="chooser-body">
                  16px inputs (no Safari zoom) + fixed menu under the field, repositioned with
                  visualViewport when the keyboard opens.
                </p>
              </a>
              <a class="chooser-card" href="#/b">
                <p class="chooser-kicker">Mock B</p>
                <p class="chooser-title">Expand to top</p>
                <p class="chooser-body">
                  Tapping the ticker field morphs into a full search sheet at the top — results
                  below. Feels like the page reorganized, not a popup.
                </p>
              </a>
            </div>
            <p class="note">
              Both screens mirror the onboarding / portfolio holdings editor. Try
              <strong>REL</strong>, <strong>INFY</strong>, <strong>flexi</strong>, or
              <strong>gold</strong>.
            </p>
          </div>
        </div>
      </div>
    `;
  }

  function mountMockA() {
    root.innerHTML = `
      <div class="app">
        ${holdingsChrome(
          'Mock A',
          'Type in a ticker field — results stay under the input (anchored dropdown).'
        )}
      </div>
      <div id="dropdownRoot"></div>
    `;
    bootHoldings({ mode: 'a' });
  }

  function mountMockB() {
    root.innerHTML = `
      <div class="app" id="appRoot">
        ${holdingsChrome(
          'Mock B',
          'Tap a ticker field — it lifts to the top and results appear below.'
        )}
      </div>
      <div class="search-layer" id="searchLayer" aria-hidden="true">
        <div class="search-backdrop" id="searchBackdrop"></div>
        <div class="search-sheet" id="searchSheet">
          <div class="search-chrome">
            <button type="button" class="cancel" id="searchCancel">Cancel</button>
            <div class="search-field-wrap">
              <input id="searchInput" type="text" inputmode="search" enterkeyhint="search"
                autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"
                placeholder="Search stock, ETF, or fund" />
            </div>
          </div>
          <div class="sheet-results" id="sheetResults"></div>
        </div>
      </div>
    `;
    bootHoldings({ mode: 'b' });
  }

  function bootHoldings({ mode }) {
    const rowsEl = document.getElementById('rows');
    const addRowBtn = document.getElementById('addRow');
    const totalValueEl = document.getElementById('totalValue');
    const totalHintEl = document.getElementById('totalHint');
    const costHeadEl = document.getElementById('costHead');
    let rows = createInitialRows();
    let costMode = 'invested';

    function updateTotals() {
      totalValueEl.textContent = formatInr(sumInvested(rows));
      const n = countHoldings(rows);
      totalHintEl.textContent =
        n === 0
          ? 'Add holdings below — match this with Total invested in your broker app.'
          : `${n} holding${n === 1 ? '' : 's'} · check this against your broker app`;
    }

    document.querySelectorAll('.cost-toggle button').forEach((button) => {
      button.addEventListener('click', () => {
        costMode = button.dataset.cost;
        document.querySelectorAll('.cost-toggle button').forEach((el) => {
          el.classList.toggle('active', el === button);
        });
        costHeadEl.textContent = costMode === 'avg' ? 'Avg price' : 'Total invested';
        renderRows();
      });
    });

    if (mode === 'a') bootA();
    else bootB();

    function bootA() {
      const dropdownRoot = document.getElementById('dropdownRoot');
      let activeRowId = null;
      let dropdownEl = null;

      function closeDropdown() {
        activeRowId = null;
        if (dropdownEl) {
          dropdownEl.remove();
          dropdownEl = null;
        }
      }

      function fixedMenuBox(anchorEl) {
        const rect = anchorEl.getBoundingClientRect();
        const vv = window.visualViewport;
        const offsetTop = vv?.offsetTop ?? 0;
        const offsetLeft = vv?.offsetLeft ?? 0;
        const viewportWidth = vv?.width ?? window.innerWidth;
        const viewportHeight = vv?.height ?? window.innerHeight;
        const gap = 4;
        const maxMenuHeight = Math.min(256, Math.max(120, viewportHeight * 0.4));
        const spaceBelow = viewportHeight - (rect.bottom - offsetTop) - gap - 8;
        const placeAbove = spaceBelow < 120 && rect.top - offsetTop > spaceBelow;
        const width = Math.min(Math.max(rect.width, 240), Math.max(160, viewportWidth - 24));
        const left = Math.min(
          Math.max(12, rect.left - offsetLeft),
          Math.max(12, viewportWidth - width - 12)
        );
        if (placeAbove) {
          return {
            bottom: `${viewportHeight - (rect.top - offsetTop) + gap}px`,
            left: `${left}px`,
            width: `${width}px`,
            maxHeight: `${Math.min(maxMenuHeight, Math.max(80, rect.top - offsetTop - 16))}px`,
            top: 'auto',
          };
        }
        return {
          top: `${rect.bottom - offsetTop + gap}px`,
          left: `${left}px`,
          width: `${width}px`,
          maxHeight: `${Math.min(maxMenuHeight, Math.max(80, spaceBelow))}px`,
          bottom: 'auto',
        };
      }

      function renderDropdown(anchorEl, query) {
        if (!dropdownEl) {
          dropdownEl = document.createElement('div');
          dropdownEl.className = 'dropdown';
          dropdownRoot.appendChild(dropdownEl);
        }
        Object.assign(dropdownEl.style, fixedMenuBox(anchorEl));
        const q = query.trim();
        if (q.length < 2) {
          dropdownEl.innerHTML = `<p class="dropdown-empty">Type at least 2 characters…</p>`;
          return;
        }
        const matches = filterAssets(q);
        dropdownEl.innerHTML = matches.length
          ? matches.map((asset, i) => resultButtonHtml(asset, i)).join('')
          : `<p class="dropdown-empty">No matches found.</p>`;
      }

      function track() {
        if (!dropdownEl || !activeRowId) return;
        const input = rowsEl.querySelector(`[data-id="${activeRowId}"] [data-role="ticker"]`);
        if (!input) return;
        Object.assign(dropdownEl.style, fixedMenuBox(input.closest('.search-anchor') || input));
      }
      window.addEventListener('resize', track);
      window.addEventListener('scroll', track, true);
      window.visualViewport?.addEventListener('resize', track);
      window.visualViewport?.addEventListener('scroll', track);

      window.renderRows = function renderRows() {
        rowsEl.innerHTML = rows
          .map((row) => {
            const shown = row.name || row.ticker;
            const costValue = costMode === 'avg' ? row.avg ?? '' : row.invested;
            return `
              <div class="row" data-id="${row.id}">
                <div class="search-anchor">
                  <input class="field" type="text" inputmode="search" autocomplete="off"
                    autocorrect="off" autocapitalize="characters" spellcheck="false"
                    data-role="ticker" placeholder="Search stock, ETF, or fund"
                    value="${escapeHtml(shown)}" />
                </div>
                <input class="field right" type="text" inputmode="decimal" data-role="cost"
                  placeholder="${costMode === 'avg' ? 'Avg price' : 'Invested'}"
                  value="${escapeHtml(costValue)}" />
                <input class="field right" type="text" inputmode="decimal" data-role="qty"
                  placeholder="Qty" value="${escapeHtml(row.qty)}" />
                <button type="button" class="delete-btn" data-role="delete" aria-label="Delete">✕</button>
              </div>`;
          })
          .join('');
        updateTotals();
      };

      rowsEl.addEventListener('focusin', (event) => {
        const input = event.target.closest('[data-role="ticker"]');
        if (!input) return;
        activeRowId = input.closest('.row').dataset.id;
        renderDropdown(input.closest('.search-anchor') || input, input.value);
      });

      rowsEl.addEventListener('input', (event) => {
        const input = event.target;
        const row = input.closest('.row');
        if (!row) return;
        const id = row.dataset.id;
        if (input.dataset.role === 'ticker') {
          rows = rows.map((e) =>
            e.id === id ? { ...e, ticker: input.value.toUpperCase(), name: '' } : e
          );
          activeRowId = id;
          renderDropdown(input.closest('.search-anchor') || input, input.value);
          updateTotals();
        } else if (input.dataset.role === 'cost') {
          rows = rows.map((e) =>
            e.id === id
              ? costMode === 'avg'
                ? { ...e, avg: input.value }
                : { ...e, invested: input.value }
              : e
          );
          updateTotals();
        } else if (input.dataset.role === 'qty') {
          rows = rows.map((e) => (e.id === id ? { ...e, qty: input.value } : e));
        }
      });

      rowsEl.addEventListener('click', (event) => {
        const del = event.target.closest('[data-role="delete"]');
        if (!del) return;
        const id = del.closest('.row').dataset.id;
        rows = rows.filter((e) => e.id !== id);
        if (!rows.length) {
          rows = [{ id: crypto.randomUUID(), ticker: '', name: '', invested: '', qty: '', avg: '' }];
        }
        closeDropdown();
        window.renderRows();
      });

      dropdownRoot.addEventListener('mousedown', (e) => e.preventDefault());
      dropdownRoot.addEventListener('click', (event) => {
        const button = event.target.closest('.result');
        if (!button || !activeRowId) return;
        const asset = ASSETS.find((e) => e.key === button.dataset.key);
        if (!asset) return;
        rows = rows.map((e) =>
          e.id === activeRowId
            ? { ...e, ticker: asset.key, name: asset.kind === 'fund' ? asset.name : asset.name }
            : e
        );
        closeDropdown();
        window.renderRows();
      });

      document.addEventListener('focusin', (event) => {
        if (!event.target.closest('[data-role="ticker"]') && !event.target.closest('.dropdown')) {
          closeDropdown();
        }
      });

      addRowBtn.addEventListener('click', () => {
        rows = [
          ...rows,
          { id: crypto.randomUUID(), ticker: '', name: '', invested: '', qty: '', avg: '' },
        ];
        closeDropdown();
        window.renderRows();
      });

      window.renderRows();
    }

    function bootB() {
      const searchLayer = document.getElementById('searchLayer');
      const searchSheet = document.getElementById('searchSheet');
      const searchInput = document.getElementById('searchInput');
      const searchCancel = document.getElementById('searchCancel');
      const searchBackdrop = document.getElementById('searchBackdrop');
      const sheetResults = document.getElementById('sheetResults');
      const appRoot = document.getElementById('appRoot');
      let activeRowId = null;
      let closing = false;

      function renderSheetResults(query) {
        const q = query.trim();
        if (q.length < 2) {
          sheetResults.innerHTML = `<p class="dropdown-empty">Type at least 2 characters…</p>`;
          return;
        }
        const matches = filterAssets(q);
        sheetResults.innerHTML = matches.length
          ? matches.map((asset, i) => resultButtonHtml(asset, i)).join('')
          : `<p class="dropdown-empty">No matches found.</p>`;
      }

      function openSearch(rowId, triggerEl) {
        if (closing) return;
        activeRowId = rowId;
        const rect = triggerEl.getBoundingClientRect();
        const frame = appRoot.getBoundingClientRect();
        const top = rect.top - frame.top;
        const left = rect.left - frame.left;
        const width = rect.width;
        const height = Math.max(rect.height, 40);
        searchLayer.classList.add('open');
        searchLayer.setAttribute('aria-hidden', 'false');
        searchSheet.classList.add('morphing-from');
        searchSheet.style.borderRadius = '8px';
        searchSheet.style.clipPath = `inset(${top}px ${frame.width - left - width}px ${
          frame.height - top - height
        }px ${left}px round 8px)`;
        searchSheet.style.opacity = '1';
        searchInput.value = '';
        renderSheetResults('');
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            searchSheet.classList.remove('morphing-from');
            searchSheet.style.transition =
              'clip-path 420ms cubic-bezier(0.16, 1, 0.3, 1), border-radius 420ms cubic-bezier(0.16, 1, 0.3, 1)';
            searchSheet.style.clipPath = 'inset(0 0 0 0 round 0)';
            searchSheet.style.borderRadius = '0';
            searchInput.focus({ preventScroll: true });
          });
        });
      }

      function closeSearch() {
        if (
          (!searchLayer.classList.contains('open') && !searchLayer.classList.contains('closing')) ||
          closing
        ) {
          return;
        }
        closing = true;
        searchInput.blur();
        const trigger = rowsEl.querySelector(`[data-id="${activeRowId}"] [data-role="open"]`);
        const frame = appRoot.getBoundingClientRect();
        searchLayer.classList.remove('open');
        searchLayer.classList.add('closing');
        if (trigger) {
          const rect = trigger.getBoundingClientRect();
          const top = rect.top - frame.top;
          const left = rect.left - frame.left;
          const width = rect.width;
          const height = Math.max(rect.height, 40);
          searchSheet.style.transition =
            'clip-path 300ms cubic-bezier(0.4, 0, 0.2, 1), border-radius 300ms ease';
          searchSheet.style.clipPath = `inset(${top}px ${frame.width - left - width}px ${
            frame.height - top - height
          }px ${left}px round 8px)`;
          searchSheet.style.borderRadius = '8px';
        } else {
          searchSheet.style.opacity = '0';
        }
        window.setTimeout(() => {
          searchLayer.classList.remove('closing');
          searchSheet.style.clipPath = '';
          searchSheet.style.borderRadius = '';
          searchSheet.style.transition = '';
          searchSheet.style.opacity = '';
          searchLayer.setAttribute('aria-hidden', 'true');
          activeRowId = null;
          closing = false;
          window.renderRows();
        }, 320);
      }

      window.renderRows = function renderRows() {
        rowsEl.innerHTML = rows
          .map((row) => {
            const shown = row.name || row.ticker || 'Search stock, ETF, or fund';
            const empty = !row.ticker;
            const costValue = costMode === 'avg' ? row.avg ?? '' : row.invested;
            return `
              <div class="row" data-id="${row.id}">
                <button type="button" class="field" data-role="open"
                  style="text-align:left;color:${empty ? 'var(--pe-text-muted)' : 'var(--pe-text)'}">
                  ${escapeHtml(shown)}
                </button>
                <input class="field right" type="text" inputmode="decimal" data-role="cost"
                  placeholder="${costMode === 'avg' ? 'Avg price' : 'Invested'}"
                  value="${escapeHtml(costValue)}" />
                <input class="field right" type="text" inputmode="decimal" data-role="qty"
                  placeholder="Qty" value="${escapeHtml(row.qty)}" />
                <button type="button" class="delete-btn" data-role="delete" aria-label="Delete">✕</button>
              </div>`;
          })
          .join('');
        updateTotals();
      };

      rowsEl.addEventListener('click', (event) => {
        const open = event.target.closest('[data-role="open"]');
        if (open) {
          openSearch(open.closest('.row').dataset.id, open);
          return;
        }
        const del = event.target.closest('[data-role="delete"]');
        if (!del) return;
        const id = del.closest('.row').dataset.id;
        rows = rows.filter((e) => e.id !== id);
        if (!rows.length) {
          rows = [{ id: crypto.randomUUID(), ticker: '', name: '', invested: '', qty: '', avg: '' }];
        }
        window.renderRows();
      });

      rowsEl.addEventListener('input', (event) => {
        const input = event.target;
        const row = input.closest('.row');
        if (!row) return;
        const id = row.dataset.id;
        if (input.dataset.role === 'cost') {
          rows = rows.map((e) =>
            e.id === id
              ? costMode === 'avg'
                ? { ...e, avg: input.value }
                : { ...e, invested: input.value }
              : e
          );
          updateTotals();
        } else if (input.dataset.role === 'qty') {
          rows = rows.map((e) => (e.id === id ? { ...e, qty: input.value } : e));
        }
      });

      addRowBtn.addEventListener('click', () => {
        rows = [
          ...rows,
          { id: crypto.randomUUID(), ticker: '', name: '', invested: '', qty: '', avg: '' },
        ];
        window.renderRows();
      });

      searchInput.addEventListener('input', () => renderSheetResults(searchInput.value));
      searchCancel.addEventListener('click', closeSearch);
      searchBackdrop.addEventListener('click', closeSearch);
      sheetResults.addEventListener('click', (event) => {
        const button = event.target.closest('.result');
        if (!button || !activeRowId) return;
        const asset = ASSETS.find((e) => e.key === button.dataset.key);
        if (!asset) return;
        rows = rows.map((e) =>
          e.id === activeRowId
            ? { ...e, ticker: asset.key, name: asset.kind === 'fund' ? asset.name : asset.name }
            : e
        );
        closeSearch();
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') closeSearch();
      });

      window.renderRows();
    }
  }

  function route() {
    const hash = location.hash.replace(/^#/, '') || '/';
    if (hash === '/a') mountMockA();
    else if (hash === '/b') mountMockB();
    else renderHome();
    window.scrollTo(0, 0);
  }

  window.addEventListener('hashchange', route);
  route();
})();

</script>
</body>
</html>
